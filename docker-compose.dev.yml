# ============================================================
# Docker Compose — Desarrollo LOCAL (con codigo fuente)
# ============================================================
# Usa los mismos .env y schema.sql en esta carpeta.
# ============================================================

services:
  db:
    image: mysql:8.0
    container_name: lopbuk_db_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - lopbuk_db_data_dev:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: node:20-alpine
    container_name: lopbuk_backend_dev
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-openai}
      IS_LOCAL_INSTANCE: "true"
      CLOUD_API_URL: ${CLOUD_API_URL}
      SYNC_SECRET: ${SYNC_SECRET}
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS:-30000}
      SYNC_TENANT_ID: ${SYNC_TENANT_ID}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "3001:3001"

  frontend:
    image: node:20-alpine
    container_name: lopbuk_frontend_dev
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "3000:3000"

volumes:
  lopbuk_db_data_dev:
    name: lopbuk_db_data_dev
